<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Go to article</title>
  <style type="text/css">
    body { font: 16px system-ui, sans-serif; padding: 2rem; max-width: 42rem; }
    input, button { font: inherit; padding: .5rem .75rem; }
    input { width: 14rem; }
    .row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
    .msg { margin-top: 1rem; }
    code { background: #f3f3f3; padding: .15rem .3rem; border-radius: .25rem; }
  </style>
</head>
<body>
  <h1>Go to article</h1>

  <div class="row">
    <label for="articleId">Article ID</label>
    <input id="articleId" inputmode="numeric" autocomplete="off" placeholder="000802" />
    <button id="goBtn">Go</button>
  </div>

  <p class="msg" id="msg"></p>
  <script type="text/javascript" src="common/js/go-to-id.js" defer="defer"><!-- serialize --> </script>
  <p>Tip: you can link directly with <code>/go.html?id=000802</code>.</p>
</body>
</html>
